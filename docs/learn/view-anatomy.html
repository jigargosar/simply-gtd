<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>simply-gtd | view anatomy</title>

    <!-- CDN deps (explainer only) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: '#0b6bcb',
              page: '#f6f7f9',
              ink: '#111827',
              muted: '#6b7280',
              hair: '#e5e7eb',
            },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          },
        },
      }
    </script>

    <style>
      .codeline {
        display: grid;
        grid-template-columns: 2.5rem 1fr;
        cursor: pointer;
        border-left: 3px solid transparent;
      }
      .codeline:hover {
        background: #eef2ff;
      }
      .codeline.active {
        background: #e0e7ff;
        border-left-color: #0b6bcb;
      }
      .codeline .ln {
        color: #9ca3af;
        text-align: right;
        padding-right: 0.75rem;
        user-select: none;
      }
      .codeline pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .codeline code {
        background: transparent !important;
        padding: 0 !important;
      }
    </style>
  </head>

  <body class="bg-page text-ink font-sans antialiased">
    <header class="border-b border-hair bg-white">
      <div class="mx-auto max-w-5xl px-5 py-4">
        <h1 class="text-lg font-semibold tracking-tight">
          Anatomy of the preview <code class="text-accent">view</code> function
        </h1>
        <p class="mt-1 text-sm text-muted">
          Interactive teardown of the current view in
          <code>src/preview-v001/main.ts</code>. Step through it, or click any
          line.
        </p>
      </div>
    </header>

    <main class="mx-auto grid max-w-5xl gap-5 px-5 py-6 lg:grid-cols-2">
      <!-- CODE -->
      <section class="rounded-xl border border-hair bg-white shadow-sm">
        <div
          class="flex items-center justify-between border-b border-hair px-4 py-2.5"
        >
          <span class="text-xs font-semibold uppercase tracking-wide text-muted"
            >view</span
          >
          <div class="flex items-center gap-1.5">
            <button
              id="prev"
              class="rounded-md border border-hair px-2.5 py-1 text-xs font-medium text-muted hover:bg-page"
            >
              ‹ Prev
            </button>
            <span id="counter" class="px-1 text-xs font-medium text-muted"
              >1 / 8</span
            >
            <button
              id="next"
              class="rounded-md bg-accent px-2.5 py-1 text-xs font-semibold text-white hover:opacity-90"
            >
              Next ›
            </button>
          </div>
        </div>
        <div id="code" class="py-2 text-[13px] leading-relaxed"></div>
        <div class="border-t border-hair px-4 py-2 text-xs text-muted">
          Tip: click any line to jump to its explanation.
        </div>
      </section>

      <!-- EXPLANATION -->
      <section class="flex flex-col gap-4">
        <div
          id="panel"
          class="rounded-xl border border-hair bg-white p-4 shadow-sm"
        >
          <!-- filled by JS -->
        </div>

        <!-- QUIZ -->
        <div class="rounded-xl border border-hair bg-white p-4 shadow-sm">
          <h2 class="text-sm font-semibold">Checkpoints</h2>
          <p class="mb-3 mt-0.5 text-xs text-muted">
            Answer in your head, then reveal.
          </p>
          <div id="quiz" class="flex flex-col gap-2"></div>
        </div>
      </section>
    </main>

    <script>
      // ----- THE CODE (current view, verbatim) -----
      const lines = [
        `export const view = (model: Model): Document => {`,
        `  const h = html<Message>()`,
        ``,
        `  return {`,
        `    title: 'simply-gtd | preview v001',`,
        `    body: h.div(`,
        `      [h.Class('min-h-screen bg-white flex items-center justify-center p-6')],`,
        `      [`,
        `        Button.view<Message>({`,
        `          onClick: ClickedGreeting(),`,
        `          toView: attributes =>`,
        `            h.button(`,
        `              [`,
        `                ...attributes.button,`,
        `                h.Class('text-2xl font-semibold text-gray-900 hover:text-blue-600 transition'),`,
        `              ],`,
        `              [model.greeting],`,
        `            ),`,
        `        }),`,
        `      ],`,
        `    ),`,
        `  }`,
        `}`,
      ]

      // ----- STEPS (1-indexed line ranges) -----
      const steps = [
        {
          lines: [1],
          title: 'Signature: Model in, Document out',
          html: `<p>A view is a pure function from <code>Model</code> to HTML. Here it takes the current model (<code>{ greeting: string }</code>) and returns a <code>Document</code>, the top-level page shape:</p>
          <pre class="mt-2 rounded bg-page p-2 text-xs">type Document = Readonly&lt;{ title: string; canonical?: string; ogUrl?: string; body: Html }&gt;</pre>
          <p class="mt-2"><code>export</code> matters: <code>entry.ts</code> imports <code>view</code> and hands it to the runtime. <code>main.ts</code> never boots anything itself, so it stays importable from tests.</p>`,
          cite: 'Document type — foldkit/src/html/index.ts:136',
        },
        {
          lines: [2],
          title: 'Bind the typed html factory',
          html: `<p><code>html</code> is a factory. Calling it returns a record of builders: elements (<code>h.div</code>, <code>h.button</code>), attributes (<code>h.Class</code>, <code>h.OnClick</code>), and helpers (<code>h.empty</code>, <code>h.keyed</code>).</p>
          <p class="mt-2">The <code>&lt;Message&gt;</code> type parameter ties every event attribute to <strong>your</strong> Message union. Passing a non-Message to <code>h.OnClick</code> is a compile error.</p>
          <p class="mt-2">Convention: bind <code>h</code> <strong>inside</strong> each view, never at module scope.</p>`,
          cite: 'docs: core/view "Typed HTML Helpers"',
        },
        {
          lines: [4, 5],
          title: 'Return a Document: title + body',
          html: `<p>The returned object has two parts that matter here: <code>title</code> (written to the page <code>&lt;title&gt;</code> by the runtime) and <code>body</code> (the element tree, everything visible).</p>`,
          cite: 'Document type — foldkit/src/html/index.ts:136',
        },
        {
          lines: [6, 7],
          title: 'h.div([attributes], [children])',
          html: `<p>Every element builder takes <strong>two arrays</strong>:</p>
          <ol class="mt-1 list-decimal pl-5"><li><strong>Attributes</strong> first (classes, handlers, aria).</li><li><strong>Children</strong> second (text or nested elements).</li></ol>
          <p class="mt-2"><code>h.Class('...')</code> is an attribute builder producing <code>class="..."</code>. These are stock Tailwind classes (not the mock tokens like <code>bg-page</code>), since those aren't in the real Tailwind build yet.</p>`,
          cite: 'docs: core/view',
        },
        {
          lines: [9],
          title: 'Button.view — a stateless render helper',
          html: `<p>This is the only piece from <code>@foldkit/ui</code>. <code>Button.view</code> owns no Model or update. It computes the right button attributes (type, tabindex, click, disabled/aria) and asks <strong>you</strong> to render the element.</p>
          <pre class="mt-2 rounded bg-page p-2 text-xs">view: &lt;ParentMessage&gt;(config: ViewConfig&lt;ParentMessage&gt;) =&gt; Html</pre>
          <p class="mt-2"><code>ViewConfig</code>: <code>toView</code> (required), plus optional <code>onClick</code>, <code>isDisabled</code>, <code>type</code>, <code>isAutofocus</code>.</p>`,
          cite: 'Button.view — ui/src/button/index.ts:23',
        },
        {
          lines: [10],
          title: 'onClick is a fact, not a callback',
          html: `<p><code>onClick: ClickedGreeting()</code> is the <strong>Message</strong> to emit on click. The <code>()</code> constructs the message value.</p>
          <p class="mt-2">Internally Button turns this into <code>h.OnClick(onClick)</code> (and omits it when disabled). You pass a fact describing <em>what happened</em>; <code>update</code> decides the consequence.</p>`,
          cite: 'onClick wiring — ui/src/button/index.ts:40-41',
        },
        {
          lines: [11, 12, 13, 14, 15, 16, 17, 18],
          title: 'toView: Button hands you its attributes',
          html: `<p>This contract is what makes Button unopinionated about looks.</p>
          <ul class="mt-1 list-disc pl-5">
            <li>Button builds behavior/a11y attributes and passes them as <code>attributes.button</code>.</li>
            <li>For us that array is <code>h.Type('button')</code>, <code>h.Tabindex(0)</code>, <code>h.OnClick(ClickedGreeting())</code>.</li>
            <li>You <code>...attributes.button</code> spread them, then add your own <code>h.Class(...)</code>.</li>
            <li>The child <code>[model.greeting]</code> is the only place the Model touches the view.</li>
          </ul>
          <p class="mt-2"><strong>Division of labor:</strong> Button owns wiring + a11y, you own markup + styling.</p>`,
          cite: 'ButtonAttributes / build — ui/src/button/index.ts:9, 45-51',
        },
        {
          lines: [19, 20, 21, 22, 23],
          title: 'Close up — and the loop',
          html: `<p>Closing the config, children, div, and Document.</p>
          <p class="mt-2"><strong>The full cycle:</strong> click → <code>ClickedGreeting</code> goes to <code>update</code> → update returns a new Model with the greeting flipped → runtime calls <code>view</code> again → <code>[model.greeting]</code> renders the new text.</p>
          <p class="mt-2"><code>view</code> never mutates state and never runs effects. It reads Model into markup and wires events to Messages. That is the whole job.</p>`,
          cite: 'docs: core/view "view is guaranteed pure"',
        },
      ]

      // ----- QUIZ -----
      const quiz = [
        {
          q: 'Does view mutate the Model?',
          a: 'No. It is pure. It only returns markup and emits Messages; update produces new state.',
        },
        {
          q: 'onClick receives a callback or a Message?',
          a: 'A Message value: ClickedGreeting(). The () constructs it. Button turns it into h.OnClick.',
        },
        {
          q: 'Who provides attributes.button, and what do you do with it?',
          a: 'Button.view provides it (type, tabindex, OnClick). You spread it into your own h.button, then add styling.',
        },
        {
          q: 'What type does view return?',
          a: 'A Document: Readonly<{ title; body; canonical?; ogUrl? }>. entry.ts mounts body into #root.',
        },
      ]

      // ----- RENDER CODE -----
      const codeEl = document.getElementById('code')
      const lineToStep = {}
      steps.forEach((s, i) => s.lines.forEach(l => (lineToStep[l] = i)))

      lines.forEach((text, idx) => {
        const n = idx + 1
        const row = document.createElement('div')
        row.className = 'codeline'
        row.dataset.line = n
        const code = text.length
          ? hljs.highlight(text, { language: 'typescript' }).value
          : '&nbsp;'
        row.innerHTML = `<span class="ln">${n}</span><pre><code class="hljs">${code}</code></pre>`
        row.addEventListener('click', () => {
          if (lineToStep[n] !== undefined) go(lineToStep[n])
        })
        codeEl.appendChild(row)
      })

      // ----- RENDER QUIZ -----
      const quizEl = document.getElementById('quiz')
      quiz.forEach(item => {
        const d = document.createElement('details')
        d.className = 'rounded-lg border border-hair bg-page px-3 py-2'
        d.innerHTML = `<summary class="cursor-pointer text-sm font-medium">${item.q}</summary><p class="mt-2 text-sm text-muted">${item.a}</p>`
        quizEl.appendChild(d)
      })

      // ----- STEP NAV -----
      let current = 0
      const panel = document.getElementById('panel')
      const counter = document.getElementById('counter')

      function go(i) {
        current = Math.max(0, Math.min(steps.length - 1, i))
        const s = steps[current]
        document.querySelectorAll('.codeline').forEach(el => {
          el.classList.toggle(
            'active',
            s.lines.includes(Number(el.dataset.line)),
          )
        })
        const first = document.querySelector(
          `.codeline[data-line="${s.lines[0]}"]`,
        )
        if (first)
          first.scrollIntoView({ block: 'nearest', behavior: 'smooth' })
        panel.innerHTML = `
          <div class="flex items-center gap-2">
            <span class="grid h-6 w-6 place-items-center rounded-md bg-accent text-xs font-semibold text-white">${current + 1}</span>
            <h2 class="text-sm font-semibold">${s.title}</h2>
          </div>
          <div class="mt-3 space-y-1 text-sm leading-relaxed [&_code]:rounded [&_code]:bg-page [&_code]:px-1 [&_code]:text-[12px]">${s.html}</div>
          <p class="mt-3 border-t border-hair pt-2 text-xs text-muted">Source: ${s.cite}</p>`
        counter.textContent = `${current + 1} / ${steps.length}`
      }

      document
        .getElementById('prev')
        .addEventListener('click', () => go(current - 1))
      document
        .getElementById('next')
        .addEventListener('click', () => go(current + 1))
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') go(current - 1)
        if (e.key === 'ArrowRight') go(current + 1)
      })

      go(0)
    </script>
  </body>
</html>
