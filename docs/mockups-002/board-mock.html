<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>simply-gtd — board mock</title>

    <!-- Mock-only deps (CDN). Real app uses self-hosted Inter + Tailwind v4 build + Lucide. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: '#1e90ff', // V5 bright: graphical fills only
              accentText: '#0b6bcb', // V5 darkened: text/buttons (AA)
              page: '#f6f7f9',
              ink: '#111827',
              muted: '#6b7280',
              hair: '#e5e7eb',
            },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            boxShadow: {
              card: '0 1px 2px rgba(16,24,40,0.06), 0 1px 3px rgba(16,24,40,0.10)',
              // elevation step 3 — floating menus only (move picker), NOT inline edit
              pop: '0 8px 24px rgba(16,24,40,0.16), 0 2px 6px rgba(16,24,40,0.10)',
            },
            borderRadius: { card: '10px' },
          },
        },
      }
    </script>

    <style>
      /* V10 — focus ring */
      :where(button, a, input, textarea, [tabindex]):focus-visible {
        outline: 2px solid #0b6bcb;
        outline-offset: 2px;
        border-radius: 6px;
      }
    </style>
  </head>

  <body class="bg-page text-ink font-sans antialiased">
    <!-- ===== STICKY HEADER: title · search · controls ===== -->
    <header class="sticky top-0 z-20 border-b border-hair bg-white/90 backdrop-blur">
      <div class="mx-auto flex max-w-[680px] items-center gap-3 px-4 py-3">
        <div class="flex shrink-0 items-center gap-2">
          <span class="grid h-7 w-7 place-items-center rounded-md bg-accent text-white">
            <i data-lucide="check-square" class="h-4 w-4"></i>
          </span>
          <span class="text-base font-semibold tracking-tight">simply-gtd</span>
        </div>
        <label class="relative min-w-0 flex-1">
          <i data-lucide="search" class="pointer-events-none absolute left-2.5 top-1/2 h-4 w-4 -translate-y-1/2 text-muted"></i>
          <input type="search" placeholder="Search items and sections…"
            class="w-full rounded-lg border border-hair bg-page py-1.5 pl-8 pr-3 text-sm placeholder:text-muted focus:bg-white" />
        </label>
        <div id="filter" class="flex shrink-0 items-center gap-2"></div>
      </div>
    </header>

    <!-- ===== BOARD (rendered from data) ===== -->
    <main class="mx-auto max-w-[680px] px-4 py-6">
      <div id="board" class="flex flex-col gap-4"></div>
    </main>

    <script>
      // ----- DATA -----
      const board = {
        filter: 'all', // 'open' | 'done' | 'all'
        sections: [
          {
            title: 'Inbox',
            collapsed: false,
            items: [
              { text: 'Reply to the venue about the June booking', done: false, ui: 'move' },
              { text: 'Draft the Q3 plan — sections for hiring, budget, and the two product bets; share with the team before Friday', done: false },
              { text: 'Renew the domain', done: true },
              { text: 'Skim the new onboarding doc', done: false },
            ],
          },
          {
            title: 'This Week',
            collapsed: false,
            items: [
              { text: 'Book the team offsite', done: false, ui: 'edit' },
              { text: 'Send the invoice to Acme', done: true },
              { text: 'Confirm the catering headcount', done: true },
            ],
          },
          {
            title: 'Projects',
            collapsed: false,
            items: [
              { text: 'Wire up persistence (localStorage one-blob)', done: false },
              { text: 'Fractional-index ordering for drag', done: false },
              { text: 'Pick the icon set', done: true },
            ],
          },
          {
            title: 'Waiting For',
            collapsed: false,
            items: [
              { text: 'Landlord — reply about the lease renewal', done: false },
              { text: 'Design feedback from Priya', done: false },
            ],
          },
          {
            title: 'Someday / Maybe',
            collapsed: true,
            items: [
              { text: 'Learn to sail', done: false },
              { text: 'Repaint the study', done: false },
              { text: 'Read the Effect docs end to end', done: false },
              { text: 'Try the new ramen place', done: true },
              { text: 'Digitise the old photos', done: false },
              { text: 'Build a standing desk', done: false },
              { text: 'Plan a trip to Kyoto', done: false },
            ],
          },
          {
            title: 'Reading List',
            collapsed: false,
            items: [
              { text: 'Thinking in Systems — finish part 2', done: false },
              { text: 'The Pragmatic Programmer', done: true },
              { text: 'A Philosophy of Software Design', done: false },
            ],
          },
          {
            title: 'Groceries',
            collapsed: false,
            items: [
              { text: 'Olive oil', done: false },
              { text: 'Coffee beans', done: false },
              { text: 'Eggs', done: true },
            ],
          },
          { title: 'Errands', collapsed: false, items: [] },
        ],
      }

      // ----- HELPERS -----
      const esc = s =>
        s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')

      const isVisible = (item, filter) =>
        filter === 'all' || (filter === 'open' ? !item.done : item.done)

      const checkbox = done =>
        done
          ? `<button title="Mark not done" class="mt-0.5 grid h-5 w-5 shrink-0 place-items-center rounded-md border-2 border-accent bg-accent text-white"><i data-lucide="check" class="h-3.5 w-3.5"></i></button>`
          : `<button title="Mark done" class="mt-0.5 grid h-5 w-5 shrink-0 place-items-center rounded-md border-2 border-muted/50 hover:border-accent"></button>`

      const checkboxStatic = done =>
        done
          ? `<span class="mt-0.5 grid h-5 w-5 shrink-0 place-items-center rounded-md border-2 border-accent bg-accent text-white"><i data-lucide="check" class="h-3.5 w-3.5"></i></span>`
          : `<span class="mt-0.5 grid h-5 w-5 shrink-0 place-items-center rounded-md border-2 border-muted/50"></span>`

      const grip = `<button title="Drag to reorder" class="mt-0.5 grid h-5 w-5 shrink-0 cursor-grab place-items-center rounded-md text-muted/70 hover:bg-page hover:text-muted"><i data-lucide="grip-vertical" class="h-4 w-4"></i></button>`
      const gripStatic = `<span class="mt-0.5 grid h-5 w-5 shrink-0 place-items-center text-muted/70"><i data-lucide="grip-vertical" class="h-4 w-4"></i></span>`

      // ----- ITEM VARIANTS -----
      const plainItem = item => `
        <li class="group flex items-start gap-2.5 rounded-lg px-2 py-2 hover:bg-page">
          ${checkbox(item.done)}
          <button class="min-w-0 flex-1 text-left text-sm leading-snug wrap-anywhere ${
            item.done ? 'text-muted line-through' : 'hover:text-accentText'
          }">${esc(item.text)}</button>
          ${grip}
        </li>`

      // inline edit — in-flow bordered panel, NO elevation
      const editItem = item => `
        <li>
          <div class="flex items-start gap-2.5 rounded-lg bg-page px-2 py-2 ring-1 ring-accent/30">
            ${checkboxStatic(item.done)}
            <span class="min-w-0 flex-1 text-sm leading-snug wrap-anywhere">${esc(item.text)}</span>
            ${gripStatic}
          </div>
          <div class="mt-1.5 rounded-xl border border-hair bg-white p-3">
            <textarea rows="2" class="w-full resize-none rounded-lg border border-hair bg-white p-2 text-sm leading-snug">${esc(item.text)}</textarea>
            <div class="mt-2 flex items-center gap-1">
              <button class="inline-flex items-center gap-1.5 rounded-md px-2 py-1 text-xs font-medium text-muted hover:bg-page hover:text-ink"><i data-lucide="check" class="h-3.5 w-3.5"></i> Done</button>
              <button class="inline-flex items-center gap-1.5 rounded-md px-2 py-1 text-xs font-medium text-muted hover:bg-page hover:text-ink"><i data-lucide="archive" class="h-3.5 w-3.5"></i> Archive</button>
              <button class="inline-flex items-center gap-1.5 rounded-md px-2 py-1 text-xs font-medium text-muted hover:bg-page hover:text-ink"><i data-lucide="corner-up-right" class="h-3.5 w-3.5"></i> Move</button>
              <div class="ml-auto flex items-center gap-1.5">
                <button class="rounded-md px-2.5 py-1 text-xs font-medium text-muted hover:bg-page hover:text-ink">Cancel</button>
                <button class="rounded-md bg-accentText px-3 py-1 text-xs font-semibold text-white hover:opacity-90">OK</button>
              </div>
            </div>
          </div>
        </li>`

      // move picker — floating menu, HAS elevation (shadow-pop)
      const moveItem = (item, currentTitle, allTitles) => `
        <li class="relative">
          <div class="flex items-start gap-2.5 rounded-lg bg-page px-2 py-2 ring-1 ring-accent/30">
            ${checkboxStatic(item.done)}
            <span class="min-w-0 flex-1 text-sm leading-snug wrap-anywhere">${esc(item.text)}</span>
            ${gripStatic}
          </div>
          <div class="absolute left-2 right-2 top-[calc(100%+6px)] z-10 rounded-xl border border-hair bg-white p-1.5 shadow-pop">
            <div class="flex items-center gap-1.5 px-1.5 py-1">
              <button title="Back to edit" class="grid h-6 w-6 place-items-center rounded-md text-muted hover:bg-page hover:text-ink"><i data-lucide="corner-up-left" class="h-4 w-4"></i></button>
              <span class="text-xs font-semibold uppercase tracking-wide text-muted">Move to</span>
            </div>
            <div class="my-1 h-px bg-hair"></div>
            <ul class="flex max-h-56 flex-col overflow-auto">
              ${allTitles
                .map(t =>
                  t === currentTitle
                    ? `<li><button class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-left text-sm font-medium text-accentText"><span class="flex-1 truncate">${esc(t)}</span><span class="text-xs text-muted">current</span><i data-lucide="check" class="h-4 w-4 shrink-0"></i></button></li>`
                    : `<li><button class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-left text-sm hover:bg-page"><span class="flex-1 truncate">${esc(t)}</span></button></li>`
                )
                .join('')}
            </ul>
          </div>
        </li>`

      const itemHTML = (item, section, allTitles) =>
        item.ui === 'edit'
          ? editItem(item)
          : item.ui === 'move'
            ? moveItem(item, section.title, allTitles)
            : plainItem(item)

      // ----- SECTION -----
      const addBtn = label => `
        <button class="inline-flex items-center gap-1.5 rounded-md px-1.5 py-1 text-sm font-medium text-accentText hover:bg-accent/10"><i data-lucide="plus" class="h-4 w-4"></i> ${label}</button>`

      const sectionHTML = (section, allTitles, filter) => {
        const visible = section.items.filter(i => isVisible(i, filter))
        const hidden = section.items.length - visible.length
        const chevron = section.collapsed ? 'chevron-right' : 'chevron-down'

        const header = `
          <div class="flex items-center gap-2 px-3 py-2.5">
            <button title="${section.collapsed ? 'Expand' : 'Collapse'} section" class="grid h-6 w-6 place-items-center rounded-md text-muted hover:bg-page"><i data-lucide="${chevron}" class="h-4 w-4"></i></button>
            <button class="flex-1 truncate text-left text-sm font-semibold hover:text-accentText">${esc(section.title)}</button>
            <span class="text-xs font-medium text-muted">${visible.length}</span>
            <button title="Drag to reorder section" class="grid h-6 w-6 cursor-grab place-items-center rounded-md text-muted/70 hover:bg-page hover:text-muted"><i data-lucide="grip-vertical" class="h-4 w-4"></i></button>
          </div>`

        if (section.collapsed)
          return `<section class="rounded-card border border-hair bg-white shadow-card">${header}</section>`

        const footer =
          hidden > 0
            ? `<div class="px-3 pb-1 pt-0 text-xs text-muted">${hidden} filtered</div>`
            : ''

        const body =
          visible.length === 0 && hidden === 0
            ? '' // empty section: I7 — just header + add
            : `<div class="h-px bg-hair"></div>
               <ul class="flex flex-col p-1.5">${visible.map(i => itemHTML(i, section, allTitles)).join('')}</ul>
               ${footer}`

        return `
          <section class="rounded-card border border-hair bg-white shadow-card">
            ${header}
            ${body}
            <div class="flex justify-end px-3 pb-2.5 ${visible.length === 0 && hidden === 0 ? 'border-t border-hair pt-2.5' : ''}">${addBtn('add')}</div>
          </section>`
      }

      // ----- FILTER CONTROL -----
      const filterHTML = filter => {
        const seg = (key, label) =>
          key === filter
            ? `<button role="tab" aria-selected="true" class="rounded-md bg-accent/15 px-2.5 py-1 font-medium text-accentText">${label}</button>`
            : `<button role="tab" class="rounded-md px-2.5 py-1 text-muted hover:text-ink">${label}</button>`
        return `
          <div role="tablist" aria-label="Done filter" class="flex items-center rounded-lg border border-hair bg-page p-0.5 text-sm">
            ${seg('open', 'Open')}${seg('done', 'Done')}${seg('all', 'All')}
          </div>
          <button title="Archive view" class="grid h-8 w-8 place-items-center rounded-lg border border-hair bg-white text-muted hover:border-muted/40 hover:text-ink"><i data-lucide="archive" class="h-4 w-4"></i></button>`
      }

      // ----- PERMUTATION DEMOS (states gallery; not all active at once IRL) -----
      const caption = t =>
        `<h2 class="px-1 pb-1 pt-4 text-xs font-semibold uppercase tracking-wide text-muted">${t}</h2>`

      const addSectionBtn = `<button class="inline-flex items-center gap-1.5 self-end rounded-lg px-2 py-1.5 text-sm font-medium text-accentText hover:bg-accent/10"><i data-lucide="plus" class="h-4 w-4"></i> add section</button>`

      // footer states: render under 'open' so done items become "N filtered"
      const footerDemo = {
        title: 'Today',
        collapsed: false,
        items: [
          { text: 'Pay the electricity bill', done: false },
          { text: 'Water the plants', done: true },
          { text: 'Call the bank', done: true },
        ],
      }
      const allDoneDemo = {
        title: 'Wrapped up',
        collapsed: false,
        items: [
          { text: 'Submit the timesheet', done: true },
          { text: 'Archive Q1 notes', done: true },
        ],
      }

      // the three done-filter states, shown together
      const seg3 = active =>
        `<div role="tablist" class="flex items-center rounded-lg border border-hair bg-page p-0.5 text-sm">` +
        ['Open', 'Done', 'All']
          .map(l =>
            l.toLowerCase() === active
              ? `<span class="rounded-md bg-accent/15 px-2.5 py-1 font-medium text-accentText">${l}</span>`
              : `<span class="rounded-md px-2.5 py-1 text-muted">${l}</span>`
          )
          .join('') +
        `</div>`
      const filterTrio = `<div class="flex flex-wrap items-center gap-4 rounded-card border border-hair bg-white p-3 shadow-card">${seg3('open')}${seg3('done')}${seg3('all')}</div>`

      // archive view: archived items render muted with a Restore action
      const archivedRow = text => `
        <li class="flex items-start gap-2.5 rounded-lg px-2 py-2 hover:bg-page">
          <span class="mt-0.5 grid h-5 w-5 shrink-0 place-items-center rounded-md border-2 border-muted/40 bg-muted/10"></span>
          <span class="min-w-0 flex-1 text-sm leading-snug text-muted wrap-anywhere">${esc(text)}</span>
          <button title="Restore" class="inline-flex shrink-0 items-center gap-1 rounded-md px-1.5 py-0.5 text-xs font-medium text-accentText hover:bg-accent/10"><i data-lucide="undo-2" class="h-3.5 w-3.5"></i> Restore</button>
        </li>`
      const archiveView = `
        <section class="rounded-card border border-hair bg-white shadow-card">
          <div class="flex items-center gap-2 px-3 py-2.5">
            <i data-lucide="archive" class="h-4 w-4 text-muted"></i>
            <span class="flex-1 text-sm font-semibold">Archived</span>
            <span class="text-xs font-medium text-muted">2</span>
          </div>
          <div class="h-px bg-hair"></div>
          <ul class="flex flex-col p-1.5">${archivedRow('Old marketing copy draft')}${archivedRow('Cancelled venue option')}</ul>
        </section>`

      // ----- RENDER -----
      const allTitles = board.sections.map(s => s.title)
      document.getElementById('filter').innerHTML = filterHTML(board.filter)
      document.getElementById('board').innerHTML =
        caption(
          'Board — items: open · done · multiline · inline-edit · move  ·  sections: expanded · collapsed · empty   (filter: All)'
        ) +
        board.sections.map(s => sectionHTML(s, allTitles, board.filter)).join('') +
        addSectionBtn +
        caption('Footer states — “N filtered” (some hidden) and all-filtered (none visible)   (filter: Open)') +
        sectionHTML(footerDemo, allTitles, 'open') +
        sectionHTML(allDoneDemo, allTitles, 'open') +
        caption('Done-filter control — the three states') +
        filterTrio +
        caption('Archive view — archived items, muted, with Restore') +
        archiveView

      lucide.createIcons()
    </script>
  </body>
</html>
